name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  static:
    name: Static checks + build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Type check
        run: pnpm run check

      - name: Build dist artifact
        run: pnpm run build

      - name: Verify dist CLI entrypoint
        run: node dist/cli.mjs --help

      - name: Validate install script syntax
        run: bash -n install.sh

      - name: Release doc sync check
        run: pnpm run release:docs-check

  test:
    name: E2E (${{ matrix.group }})
    runs-on: ubuntu-latest
    needs: static
    strategy:
      fail-fast: false
      matrix:
        group: [core, adapters, wiki, http-mcp, repo]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build dist artifact
        run: pnpm run build

      # Each group preserves the CI order of its scripts; groups run in parallel.
      - name: Run ${{ matrix.group }} tests
        run: |
          case "${{ matrix.group }}" in
            core)
              bash scripts/test-smoke.sh
              bash scripts/test-migrations.sh
              bash scripts/test-prune.sh
              bash scripts/test-utility-ranking.sh
              bash scripts/test-bootstrap.sh
              ;;
            adapters)
              bash scripts/test-adapter-runtime.sh
              bash scripts/test-claude-code-adapter.sh
              bash scripts/test-codex-adapter.sh
              bash scripts/test-antigravity-adapter.sh
              bash scripts/test-utility-shadow.sh
              ;;
            wiki)
              bash scripts/test-wiki-ingest.sh
              bash scripts/test-wiki-build.sh
              bash scripts/test-wiki-query-fileback.sh
              bash scripts/test-wiki-lint.sh
              ;;
            http-mcp)
              bash scripts/test-http-api.sh
              bash scripts/test-mcp-e2e.sh
              bash scripts/test-vector-recall.sh
              ;;
            repo)
              bash scripts/test-repo-git-exec.sh
              bash scripts/test-repo-registry.sh
              bash scripts/test-repo-sync.sh
              bash scripts/test-repo-events.sh
              bash scripts/test-repo-summary.sh
              bash scripts/test-repo-promotion.sh
              ;;
          esac

  node18-smoke:
    name: Node 18 smoke (min supported)
    runs-on: ubuntu-latest
    needs: static
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 18
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build dist artifact
        run: pnpm run build

      - name: Verify dist CLI entrypoint
        run: node dist/cli.mjs --help

      - name: Run smoke test
        run: bash scripts/test-smoke.sh

  release:
    name: Package + no-clone install
    runs-on: ubuntu-latest
    needs: static
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build dist artifact
        run: pnpm run build

      - name: Capture release version
        id: release_meta
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Package release artifact
        run: pnpm run release:package

      - name: Run no-clone install test
        run: bash scripts/test-no-clone-install.sh

      - name: Upload Linux x64 release artifact
        uses: actions/upload-artifact@v7
        with:
          name: memoria-linux-x64-v${{ steps.release_meta.outputs.version }}
          path: dist/release/memoria-linux-x64-v${{ steps.release_meta.outputs.version }}.tar.gz
